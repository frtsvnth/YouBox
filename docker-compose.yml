services:
  # ============================================================
  # YouBox — приватный загрузчик видео/аудио
  # ============================================================
  youbox:
    build:
      context: .
      dockerfile: Dockerfile
    image: youbox:latest
    container_name: youbox
    restart: unless-stopped

    ports:
      - "${PORT:-3007}:3007"

    env_file: .env

    environment:
      - YT_COOKIES_FILE=/cookies/cookies.txt

    healthcheck:
      test: /healthcheck.sh
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    tmpfs:
      - /tmp

    volumes:
      - ./data:/data
      - ${YT_COOKIES_FILE:-./data/cookies.txt}:/cookies/cookies.txt:ro

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - youbox_network

  # ============================================================
  # Caddy — reverse proxy с автоматическим HTTPS (опционально)
  # Раскомментируйте для продакшена с доменом
  # ============================================================
  # caddy:
  #   image: caddy:2-alpine
  #   container_name: youbox-caddy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   networks:
  #     - youbox_network
  #   depends_on:
  #     - youbox

networks:
  youbox_network:
    driver: bridge
